<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動小幫手</title>
    <!-- 使用最新的 Coze Chat App SDK CDN -->
    <script src="https://sf-cdn.coze.com/obj/unpkg-va/flow-platform/chat-app-sdk/1.2.0-beta.6/libs/oversea/index.js"></script>
</head>
<body>
    <div style="padding: 20px; font-family: sans-serif;">
        <h2>活動小幫手 載入中...</h2>
    </div>

    <script>
      async function initChat() {
        try {
          const res = await fetch('/api/token');
          const data = await res.json();
          
          if (!data.access_token) {
            console.error("未能透過 JWT 取得 Token", data);
            return;
          }

          new CozeWebSDK.WebChatClient({
            config: {
              bot_id: '7662199682715090949',
              isIframe: false
            },
            componentProps: {
              title: '活動小幫手',
            },
            auth: {
              type: 'token',
              token: data.access_token,
              onRefreshToken: async () => {
                const refreshRes = await fetch('/api/token');
                const refreshData = await refreshRes.json();
                return refreshData.access_token;
              }
            }
          });
        } catch (err) {
          console.error("初始化聊天室失敗：", err);
        }
      }

      initChat();
    </script>
</body>
</html>
